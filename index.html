<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mechanical Tools</title>

<style>
body { font-family: Arial; padding: 20px; }
button { margin: 5px; }

.tab { display: none; }
.tab.active { display: block; }

.unit { padding: 5px; cursor: pointer; }
.unit.active { font-weight: bold; }
.unit.inactive { color: #aaa; }

svg text { font-size: 10px; }
</style>

</head>
<body>

<h2>Mechanical Tools</h2>

<button onclick="showTab('pipe')">Pipe Tool</button>
<button onclick="showTab('converter')">Unit Converter</button>

<!-- ================= PIPE TOOL ================= -->
<div id="pipe" class="tab active">

<h3>Pipe Layout</h3>

<label>Pipes:</label>
<input id="count" type="number" value="4"><br>

<label>OD (mm):</label>
<input id="od" type="number" value="114"><br>

<label>Insulation (mm):</label>
<input id="ins" type="number" value="25"><br>

<label>Spacing Mode:</label>
<select id="mode">
  <option value="centre">Centre Spacing</option>
  <option value="clearance">Clearance</option>
</select><br>

<label>Spacing / Clearance (mm):</label>
<input id="spacing" type="number" value="100"><br>

<label>Alignment:</label>
<select id="align">
  <option value="center">Centre</option>
  <option value="top">Top</option>
  <option value="bottom">Bottom</option>
</select>

<br><br>
<button onclick="draw()">Generate</button>

<br><br>
<svg id="diagram" width="900" height="300"></svg>

<br>
<button onclick="copyImage()">Copy Diagram</button>

</div>

<!-- ================= UNIT CONVERTER ================= -->
<div id="converter" class="tab">

<h3>Unit Converter</h3>

<select id="category" onchange="loadUnits()">
  <option value="length">Length</option>
  <option value="volume">Volume</option>
  <option value="capacity">Refrigeration Capacity</option>
  <option value="massflow">Mass Flow</option>
</select>

<div id="units"></div>

</div>

<script>

// TAB SWITCH
function showTab(tab) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.getElementById(tab).classList.add("active");
}

// ROUND TO 25
function round25(x) {
  return Math.round(x / 25) * 25;
}

// DRAW PIPE TOOL
function draw() {

  const count = +document.getElementById("count").value;
  const od = +document.getElementById("od").value;
  const ins = +document.getElementById("ins").value;
  const mode = document.getElementById("mode").value;
  const spacingInput = +document.getElementById("spacing").value;
  const align = document.getElementById("align").value;

  const totalOD = od + 2*ins;

  let centreSpacing;

  if (mode === "centre") {
    centreSpacing = round25(spacingInput);
  } else {
    centreSpacing = round25(totalOD + spacingInput);
  }

  const totalWidth = (count - 1) * centreSpacing + totalOD;

  const svg = document.getElementById("diagram");
  svg.innerHTML = "";

  const scale = 0.5;
  const r = (totalOD/2) * scale;

  let baseY = 150;

  for (let i = 0; i < count; i++) {

    let cy;

    if (align === "center") cy = baseY;
    else if (align === "top") cy = baseY + r;
    else cy = baseY - r;

    const cx = 80 + i * centreSpacing * scale;

    // outer
    const outer = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    outer.setAttribute("cx", cx);
    outer.setAttribute("cy", cy);
    outer.setAttribute("r", r);
    outer.setAttribute("stroke", "black");
    outer.setAttribute("fill", "none");

    // inner
    const inner = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    inner.setAttribute("cx", cx);
    inner.setAttribute("cy", cy);
    inner.setAttribute("r", (od/2)*scale);
    inner.setAttribute("stroke", "gray");
    inner.setAttribute("fill", "none");

    svg.appendChild(outer);
    svg.appendChild(inner);
  }

  // ===== DIMENSION: TOTAL WIDTH =====
  const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
  line.setAttribute("x1", 80);
  line.setAttribute("y1", 250);
  line.setAttribute("x2", 80 + totalWidth * scale);
  line.setAttribute("y2", 250);
  line.setAttribute("stroke", "black");

  svg.appendChild(line);

  const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
  text.setAttribute("x", 200);
  text.setAttribute("y", 270);
  text.textContent = "Total Width: " + totalWidth + " mm";

  svg.appendChild(text);

  // ===== CENTRE SPACING TEXT =====
  const spacingText = document.createElementNS("http://www.w3.org/2000/svg", "text");
  spacingText.setAttribute("x", 200);
  spacingText.setAttribute("y", 20);
  spacingText.textContent = "Centre Spacing: " + centreSpacing + " mm";

  svg.appendChild(spacingText);
}

// COPY IMAGE
async function copyImage() {
  const svg = document.getElementById("diagram");
  const data = new XMLSerializer().serializeToString(svg);
  const blob = new Blob([data], {type: "image/svg+xml"});
  const url = URL.createObjectURL(blob);

  const img = new Image();
  img.onload = async () => {
    const canvas = document.createElement("canvas");
    canvas.width = 900;
    canvas.height = 300;

    const ctx = canvas.getContext("2d");
    ctx.drawImage(img, 0, 0);

    canvas.toBlob(async (pngBlob) => {
      await navigator.clipboard.write([
        new ClipboardItem({ "image/png": pngBlob })
      ]);
      alert("Copied!");
    });

    URL.revokeObjectURL(url);
  };

  img.src = url;
}

// ===== UNIT CONVERTER =====
const data = {
  length: { mm:1, m:1000, inch:25.4, ft:304.8 },
  volume: { L:1, m3:1000, ft3:28.3168 },
  capacity: { kW:1, W:0.001, BTUhr:0.000293 },
  massflow: { kgs:1, kgh:1/3600 }
};

function loadUnits() {
  const cat = document.getElementById("category").value;
  const container = document.getElementById("units");
  container.innerHTML = "";

  Object.keys(data[cat]).forEach(unit => {
    const div = document.createElement("div");
    div.className = "unit";

    const label = document.createElement("span");
    label.textContent = unit;

    const input = document.createElement("input");
    input.type = "number";

    input.oninput = () => convert(unit, input.value);

    div.onclick = () => setActive(unit);

    div.appendChild(label);
    div.appendChild(input);

    container.appendChild(div);
  });
}

function setActive(unit) {
  document.querySelectorAll(".unit").forEach(el => {
    const u = el.querySelector("span").textContent;
    el.classList.remove("active", "inactive");

    if (u === unit) el.classList.add("active");
    else el.classList.add("inactive");
  });
}

function convert(unit, value) {
  const cat = document.getElementById("category").value;
  const base = value * data[cat][unit];

  document.querySelectorAll(".unit").forEach(el => {
    const u = el.querySelector("span").textContent;
    const input = el.querySelector("input");

    if (u !== unit) {
      input.value = (base / data[cat][u]).toFixed(3);
    }
  });

  setActive(unit);
}

loadUnits();

</script>

</body>
</html>
