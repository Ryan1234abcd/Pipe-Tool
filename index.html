<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pipe Layout Tool</title>
<style>
  body { font-family: Arial; padding: 20px; }
  input, button { margin: 5px; }
  .card { border: 1px solid #ccc; padding: 15px; margin-top: 20px; }
</style>
</head>
<body>

<h2>Pipe Layout Tool</h2>

<label>Name:</label>
<input id="name" value="Bridge 1 - CHW"><br>

<label>Number of Pipes:</label>
<input id="count" type="number" value="4"><br>

<label>Pipe OD (mm):</label>
<input id="od" type="number" value="114"><br>

<label>Insulation (mm):</label>
<input id="ins" type="number" value="25"><br>

<label>Centre Spacing (mm):</label>
<input id="spacing" type="number" value="200"><br>

<br>
<button onclick="draw()">Generate</button>

<div class="card">
  <svg id="diagram" width="800" height="200"></svg>
</div>

<br>
<button onclick="copyImage()">Copy Diagram</button>
<button onclick="copyText()">Copy Summary</button>

<script>
function draw() {
  const name = document.getElementById("name").value;
  const count = +document.getElementById("count").value;
  const od = +document.getElementById("od").value;
  const ins = +document.getElementById("ins").value;
  const spacing = +document.getElementById("spacing").value;

  const totalOD = od + 2 * ins;

  const svg = document.getElementById("diagram");
  svg.innerHTML = "";

  const scale = 0.5; // adjust for display
  const radius = (totalOD / 2) * scale;

  // Title
  const title = document.createElementNS("http://www.w3.org/2000/svg", "text");
  title.setAttribute("x", 10);
  title.setAttribute("y", 20);
  title.textContent = name;
  svg.appendChild(title);

  for (let i = 0; i < count; i++) {
    const cx = 50 + i * spacing * scale;
    const cy = 100;

    // insulation circle
    const outer = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    outer.setAttribute("cx", cx);
    outer.setAttribute("cy", cy);
    outer.setAttribute("r", radius);
    outer.setAttribute("fill", "none");
    outer.setAttribute("stroke", "black");
    svg.appendChild(outer);

    // pipe circle
    const inner = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    inner.setAttribute("cx", cx);
    inner.setAttribute("cy", cy);
    inner.setAttribute("r", (od/2)*scale);
    inner.setAttribute("fill", "none");
    inner.setAttribute("stroke", "gray");
    svg.appendChild(inner);
  }
}

async function copyImage() {
  const svg = document.getElementById("diagram");
  const data = new XMLSerializer().serializeToString(svg);
  const blob = new Blob([data], {type: "image/svg+xml"});
  const url = URL.createObjectURL(blob);

  const img = new Image();
  img.onload = async () => {
    const canvas = document.createElement("canvas");
    canvas.width = 800;
    canvas.height = 200;

    const ctx = canvas.getContext("2d");
    ctx.drawImage(img, 0, 0);

    canvas.toBlob(async (pngBlob) => {
      await navigator.clipboard.write([
        new ClipboardItem({ "image/png": pngBlob })
      ]);
      alert("Diagram copied!");
    });

    URL.revokeObjectURL(url);
  };

  img.src = url;
}

function copyText() {
  const name = document.getElementById("name").value;
  const count = document.getElementById("count").value;
  const od = document.getElementById("od").value;
  const ins = document.getElementById("ins").value;
  const spacing = document.getElementById("spacing").value;

  const totalWidth = (count - 1) * spacing;

  const text = `
${name}

${count} pipes
OD: ${od} mm
Insulation: ${ins} mm

Centre spacing: ${spacing} mm
Total width: ${totalWidth} mm
`;

  navigator.clipboard.writeText(text);
  alert("Summary copied!");
}
</script>

</body>
</html>
